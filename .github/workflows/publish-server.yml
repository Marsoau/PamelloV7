name: Publish Server
on:
  push:
    tags:
      - '*'
jobs:
  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, linux-x64, osx-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish
        env:
          OUT_DIR: PamelloV7.Server-${{ github.ref_name }}-${{ matrix.runtime }}
        run: |
          dotnet publish PamelloV7.Server/PamelloV7.Server.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:Version=${{ github.ref_name }} \
            -o "$OUT_DIR"
      - name: Add scripts
        env:
          OUT_DIR: PamelloV7.Server-${{ github.ref_name }}-${{ matrix.runtime }}
        run: |
          os_key="${{ matrix.runtime }}"
          os_key="${os_key%%-*}"          # win-x64 -> win, linux-x64 -> linux, osx-x64 -> osx
          script_dir="Scripts/$os_key"
          if [ -d "$script_dir" ]; then
            cp "$script_dir"/. "$OUT_DIR"/ -R
            chmod +x "$OUT_DIR"/*.sh 2>/dev/null || true
            echo "Added scripts from $script_dir"
          else
            echo "::warning::No launcher scripts found for '$os_key' ($script_dir)"
          fi
      - name: Create zip
        env:
          OUT_DIR: PamelloV7.Server-${{ github.ref_name }}-${{ matrix.runtime }}
        run: zip -r "$OUT_DIR.zip" "$OUT_DIR"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PamelloV7.Server-${{ matrix.runtime }}
          path: PamelloV7.Server-${{ github.ref_name }}-${{ matrix.runtime }}.zip
          if-no-files-found: error
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: PamelloV7.Server-*
          merge-multiple: true
      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: '*.zip'
          fail_on_unmatched_files: true