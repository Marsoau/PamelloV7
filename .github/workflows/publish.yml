name: Publish NuGet packages

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    name: Pack and push to NuGet.org
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: false

      - name: Restore dependencies
        run: dotnet restore PamelloV7.sln

      - name: Build Solution
        run: dotnet build PamelloV7.sln --configuration Release /p:Version=${{ github.ref_name }}

      - name: Pack PamelloV7.Core
        run: dotnet pack PamelloV7.Core/PamelloV7.Core.csproj --configuration Release --no-build /p:Version=${{ github.ref_name }} --output nupkgs

      - name: Pack PamelloV7.Wrapper
        run: dotnet pack PamelloV7.Wrapper/PamelloV7.Wrapper.csproj --configuration Release --no-build /p:Version=${{ github.ref_name }} --output nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate