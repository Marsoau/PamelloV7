name: Build and publish NuGet packages
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g., 2026.310.0-dev)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: false

      - name: Restore dependencies
        run: dotnet restore PamelloV7.sln

      - name: Build Solution
        run: dotnet build PamelloV7.sln --configuration Release /p:Version=${{ inputs.version }}

      - name: Pack PamelloV7.Core
        run: dotnet pack PamelloV7.Core/PamelloV7.Core.csproj --configuration Release --no-build /p:Version=${{ inputs.version }} --output nupkgs

      - name: Pack PamelloV7.Wrapper
        run: dotnet pack PamelloV7.Wrapper/PamelloV7.Wrapper.csproj --configuration Release --no-build /p:Version=${{ inputs.version }} --output nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
